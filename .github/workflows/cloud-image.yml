name: Cloud Image

on:
  pull_request:
    paths:
      - ".github/workflows/cloud-image.yml"
      - "deploy/**"
      - "crates/**"
      - "packages/**"
      - "scripts/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "rust-toolchain.toml"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  AGENTDASH_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/agentdash-cloud

jobs:
  cloud-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Backend check
        run: pnpm run backend:check

      - name: Frontend check
        run: pnpm run frontend:check

      - name: Generate release metadata
        run: pnpm run release:metadata -- --out dist/release/agentdash-release.json

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          SHA_TAG="${GITHUB_SHA::12}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${AGENTDASH_IMAGE_REPOSITORY}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_image_tag=${AGENTDASH_IMAGE_REPOSITORY}:${VERSION}-${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name == 'push' || github.event.inputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cloud image
        run: >
          pnpm run docker:cloud:build --
          --tag ${{ steps.image.outputs.version_tag }}
          --tag ${{ steps.image.outputs.sha_image_tag }}

      - name: Push cloud image
        if: github.event_name == 'push' || github.event.inputs.push_image == 'true'
        run: |
          docker push "${{ steps.image.outputs.version_tag }}"
          docker push "${{ steps.image.outputs.sha_image_tag }}"

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: agentdash-release-metadata
          path: dist/release/agentdash-release.json
