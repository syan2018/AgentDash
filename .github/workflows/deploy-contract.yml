name: Deployment Contract

on:
  pull_request:
    paths:
      - ".github/workflows/cloud-image.yml"
      - ".github/workflows/deploy-contract.yml"
      - "deploy/**"
      - "scripts/cloud-image-build.js"
      - "scripts/release-metadata.js"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AGENTDASH_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/agentdash-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deployment contract quality gate
        run: node scripts/quality-gates.js run deployment_contract
