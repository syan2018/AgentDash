[package]
name = "agentdash-api"
description = "AgentDash API 服务 — RPC 路由、NDJSON 流式推送与 Resume 机制"
version.workspace = true
edition.workspace = true

[[bin]]
name = "agentdash-server"
path = "src/main.rs"

[dependencies]
agentdash-state = { workspace = true }
agentdash-coordinator = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
async-stream = "0.3"
async-trait = "0.1"
tokio-util = { version = "0.7", features = ["io"] }
tokio-stream = { version = "0.1", features = ["sync"] }

# ACP 协议与执行器复用层
agent-client-protocol = { workspace = true }
executors = { workspace = true }
workspace_utils = { path = "../../third_party/vibe-kanban/crates/utils", package = "utils" }
