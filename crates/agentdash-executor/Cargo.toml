[package]
name = "agentdash-executor"
description = "AgentDash 执行器层 — AgentConnector trait、SessionHub、连接器实现"
version.workspace = true
edition.workspace = true

[dependencies]
agentdash-spi = { workspace = true }
agentdash-domain = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
async-trait = "0.1"
tokio-util = { version = "0.7", features = ["io", "rt"] }
tokio-stream = { version = "0.1", features = ["sync"] }

executors = { workspace = true }
workspace_utils = { git = "https://github.com/BloopAI/vibe-kanban.git", package = "utils" }
codex-app-server-protocol = { workspace = true }
agentdash-protocol = { workspace = true }
json-patch = "2.0"
serde_yaml = "0.9"
rmcp = { version = "1.2", features = ["client", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"] }
reqwest = { version = "0.13.2", default-features = false, features = ["rustls"] }

# Pi Agent 框架（仅云端编译）
agentdash-agent = { workspace = true, optional = true }

[features]
default = ["pi-agent"]
pi-agent = ["dep:agentdash-agent"]

[dev-dependencies]
tempfile = "3.18"
agentdash-agent = { workspace = true }
