[package]
name = "agentdash-infrastructure"
description = "AgentDash 基础设施层 — PostgreSQL Repository 实现、事件总线"
version.workspace = true
edition.workspace = true

[dependencies]
agentdash-domain = { workspace = true }
agentdash-spi = { workspace = true }
agentdash-agent-protocol = { workspace = true }
agentdash-process = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
thiserror = { workspace = true }
agentdash-diagnostics = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
async-trait = "0.1"
anyhow = { workspace = true }
postgresql_embedded = { workspace = true }
aes-gcm = "0.10"
base64 = "0.22"
rhai = { workspace = true }
rmcp = { version = "1.2", features = ["client", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"] }
reqwest = { version = "0.13.2", default-features = false, features = ["rustls"] }
tera = "1"

[dev-dependencies]
dotenvy = "0.15"
