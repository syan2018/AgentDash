[package]
name = "agentdash-local-tauri"
description = "AgentDash Tauri 桌面端壳 — 本机 runtime 管理与桌面命令"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[dependencies]
agentdash-contracts = { workspace = true }
agentdash-local = { workspace = true }
agentdash-relay = { workspace = true }
agentdash-process = { workspace = true }

anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
chrono.workspace = true
agentdash-diagnostics = { workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
sha2 = { workspace = true }
open = "5.3.3"

tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2.4.2"
tauri-plugin-updater = "2.10.1"
tauri-plugin-process = "2.3.0"

[target.'cfg(windows)'.dependencies]
winreg = "0.55"

[build-dependencies]
tauri-build = { version = "2", features = [] }
