[package]
name = "agentdash-local-tauri"
description = "AgentDash Tauri 桌面端壳 — 本机 runtime 管理与桌面命令"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[dependencies]
agentdash-api = { path = "../agentdash-api" }
agentdash-local = { path = "../agentdash-local", default-features = false }
agentdash-relay = { path = "../agentdash-relay" }

anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
chrono.workspace = true
agentdash-diagnostics = { workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true
reqwest = { version = "0.13.2", default-features = false, features = ["rustls", "json"] }
open = "5.3.3"

tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2.4.2"

[target.'cfg(windows)'.dependencies]
winreg = "0.55"

[build-dependencies]
tauri-build = { version = "2", features = [] }
