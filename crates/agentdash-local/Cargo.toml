[package]
name = "agentdash-local"
description = "本机后端 — 第三方 Agent 执行 + PiAgent 工具执行环境"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "agentdash-local"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["standalone"]
standalone = []

[dependencies]
agentdash-agent-runtime-wire.workspace = true
agentdash-agent-service-api.workspace = true
agentdash-integration-remote-runtime.workspace = true
agentdash-relay.workspace = true
agentdash-contracts.workspace = true
agentdash-platform-spi.workspace = true
agentdash-application.workspace = true
agentdash-application-ports = { workspace = true }
agentdash-application-vfs = { workspace = true }
agentdash-domain.workspace = true
agentdash-mcp.workspace = true
agentdash-process = { workspace = true }
codex-utils-pty.workspace = true
codex-utils-output-truncation.workspace = true

tokio.workspace = true
tokio-tungstenite = { version = "0.28" }
futures.workspace = true

rmcp = { workspace = true, features = ["client", "transport-child-process", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"] }
reqwest = { workspace = true }

serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
uuid.workspace = true
anyhow.workspace = true
async-trait.workspace = true
thiserror.workspace = true
agentdash-diagnostics = { workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender.workspace = true
clap = { version = "4", features = ["derive"] }
globset = { workspace = true }
ignore = "0.4"
regex.workspace = true
toml = "0.8"
base64 = { workspace = true }
flate2.workspace = true
sha2 = { workspace = true }
tar.workspace = true
gix = { version = "0.83.0", default-features = false, features = ["revision", "sha1"] }

[target.'cfg(windows)'.dependencies]
windows-service = "0.8"

[dev-dependencies]
tempfile = { workspace = true }
