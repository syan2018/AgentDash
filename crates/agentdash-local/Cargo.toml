[package]
name = "agentdash-local"
description = "本机后端 — 第三方 Agent 执行 + PiAgent 工具执行环境"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "agentdash-local"
path = "src/main.rs"

[dependencies]
agentdash-relay.workspace = true
agentdash-spi.workspace = true
agentdash-executor = { workspace = true }
agentdash-application.workspace = true
agentdash-domain.workspace = true
agentdash-acp-meta.workspace = true
agentdash-infrastructure.workspace = true
agent-client-protocol = { workspace = true }

tokio.workspace = true
sqlx.workspace = true
tokio-tungstenite = { version = "0.28" }
futures.workspace = true

rmcp = { version = "1.2", features = ["client", "transport-child-process", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"] }
reqwest = { version = "0.13.2", default-features = false, features = ["rustls"] }

serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
uuid.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
clap = { version = "4", features = ["derive"] }
globset = "0.4"
regex.workspace = true
postgresql_embedded = { workspace = true }

[dev-dependencies]
tempfile = "3.18"
