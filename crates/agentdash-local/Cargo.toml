[package]
name = "agentdash-local"
description = "本机后端 — 第三方 Agent 执行 + PiAgent 工具执行环境"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "agentdash-local"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["standalone"]
standalone = []

[dependencies]
agentdash-relay.workspace = true
agentdash-contracts.workspace = true
agentdash-spi.workspace = true
agentdash-agent-protocol = { workspace = true }
agentdash-executor = { workspace = true }
agentdash-application.workspace = true
agentdash-application-ports = { workspace = true }
agentdash-application-runtime-session = { workspace = true }
agentdash-application-vfs = { workspace = true }
agentdash-domain.workspace = true
agentdash-infrastructure.workspace = true
agentdash-mcp.workspace = true
agentdash-process = { workspace = true }
codex-utils-pty.workspace = true
codex-utils-output-truncation.workspace = true

tokio.workspace = true
sqlx.workspace = true
tokio-tungstenite = { version = "0.28" }
futures.workspace = true

rmcp = { version = "1.7", features = ["client", "transport-child-process", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"] }
reqwest = { version = "0.13.2", default-features = false, features = ["rustls"] }

serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
uuid.workspace = true
anyhow.workspace = true
thiserror.workspace = true
agentdash-diagnostics = { workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender.workspace = true
clap = { version = "4", features = ["derive"] }
globset = "0.4"
ignore = "0.4"
regex.workspace = true
toml = "0.8"
base64 = "0.22"
flate2.workspace = true
sha2 = "0.10"
tar.workspace = true
postgresql_embedded = { workspace = true }
gix = { version = "0.83.0", default-features = false, features = ["revision", "sha1"] }
portable-pty = "0.9"

[target.'cfg(windows)'.dependencies]
windows-service = "0.8"

[dev-dependencies]
tempfile = "3.18"
