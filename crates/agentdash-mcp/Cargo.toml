[package]
name = "agentdash-mcp"
description = "AgentDash MCP 服务层 — 多层级 MCP 工具暴露、会话隔离与 Agent MCP 能力注入"
version.workspace = true
edition.workspace = true

[dependencies]
agentdash-application = { workspace = true }
agentdash-domain = { workspace = true }

# MCP 协议（官方 Rust SDK）
rmcp = { workspace = true, features = [
    "server",
    "macros",
    "schemars",
    "transport-io",
    "transport-streamable-http-server",
] }

agentdash-platform-spi = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
agentdash-diagnostics = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
