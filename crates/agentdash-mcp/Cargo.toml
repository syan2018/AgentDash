[package]
name = "agentdash-mcp"
description = "AgentDash MCP 服务层 — 多层级 MCP 工具暴露、会话隔离与 Agent MCP 能力注入"
version.workspace = true
edition.workspace = true

[dependencies]
agentdash-domain = { workspace = true }

# MCP 协议（官方 Rust SDK）
rmcp = { version = "1.1", features = [
    "server",
    "macros",
    "schemars",
    "transport-io",
    "transport-streamable-http-server",
] }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = "0.1"
