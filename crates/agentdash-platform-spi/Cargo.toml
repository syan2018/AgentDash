[package]
name = "agentdash-platform-spi"
description = "AgentDash 平台能力 SPI：认证、Hook、VFS、MCP、Marketplace 与运行表面契约"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
agentdash-agent-runtime-contract = { workspace = true }
agentdash-agent = { workspace = true }
agentdash-domain = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
async-trait = "0.1"
strsim = "0.11"
agentdash-diagnostics = { workspace = true }
tracing = { workspace = true }
regex = "1"
globset = "0.4"
tokio = { workspace = true, features = ["sync"] }
tokio-util = { version = "0.7", features = ["rt"] }
schemars = { workspace = true }
ts-rs = { workspace = true }
json-patch = "2.0"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
