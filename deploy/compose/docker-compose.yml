x-agentdash-cloud-env: &agentdash-cloud-env
  AGENTDASH_PUBLIC_ORIGIN: ${AGENTDASH_PUBLIC_ORIGIN:?AGENTDASH_PUBLIC_ORIGIN is required}
  AGENTDASH_BIND_HOST: ${AGENTDASH_BIND_HOST:-0.0.0.0}
  AGENTDASH_PORT: ${AGENTDASH_PORT:-3001}
  AGENTDASH_SECRET_KEY: ${AGENTDASH_SECRET_KEY:?AGENTDASH_SECRET_KEY is required}
  AGENTDASH_MIN_DESKTOP_VERSION: ${AGENTDASH_MIN_DESKTOP_VERSION:-}
  AGENTDASH_RECOMMENDED_DESKTOP_VERSION: ${AGENTDASH_RECOMMENDED_DESKTOP_VERSION:-}
  AGENTDASH_RELAY_PROTOCOL_VERSION: ${AGENTDASH_RELAY_PROTOCOL_VERSION:-1}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  RUST_LOG: ${RUST_LOG:-info}

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentdash}
      POSTGRES_USER: ${POSTGRES_USER:-agentdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql

  migrate:
    image: ${AGENTDASH_IMAGE_REPOSITORY:-agentdash-cloud}:${AGENTDASH_VERSION:?AGENTDASH_VERSION is required}
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment: *agentdash-cloud-env
    restart: "no"

  agentdash-cloud:
    image: ${AGENTDASH_IMAGE_REPOSITORY:-agentdash-cloud}:${AGENTDASH_VERSION:?AGENTDASH_VERSION is required}
    command: ["serve"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *agentdash-cloud-env
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  reverse-proxy:
    image: caddy:2-alpine
    depends_on:
      agentdash-cloud:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
