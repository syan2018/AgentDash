services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentdash}
      POSTGRES_USER: ${POSTGRES_USER:-agentdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: agentdash-cloud:${AGENTDASH_VERSION:?AGENTDASH_VERSION is required}
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"

  agentdash-cloud:
    image: agentdash-cloud:${AGENTDASH_VERSION:?AGENTDASH_VERSION is required}
    command: ["serve"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  reverse-proxy:
    image: caddy:2-alpine
    depends_on:
      agentdash-cloud:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
